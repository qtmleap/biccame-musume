name: Deploy to Cloudflare Workers
on:
  pull_request:
    branches:
      - develop
      - master
    types: [closed]

jobs:
  deploy:
    name: Deploy Workers
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.10.0
      - name: Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
      # OG 画像の生成結果を再利用するキャッシュ。生成ロジック (script / map / characters.json)
      # のハッシュを key にしているので、いずれかが変わると key が変わって再生成される。
      # 変更なしなら scripts/generate-og-images.ts が既存 PNG を検知してスキップする。
      - name: Cache OG images
        uses: actions/cache@v5
        with:
          path: |
            public/og/characters
          key: >-
            ${{ runner.os }}-og-${{
              hashFiles(
                'scripts/generate-og-images.ts',
                'scripts/stampcamera-map.ts',
                'public/characters.json'
              )
            }}
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Generate Prisma Client
        run: bun run generate
      - name: Build Workers
        run: bun run build
        env:
          CLOUDFLARE_ENV: ${{ github.event.pull_request.base.ref == 'master' && 'production' || 'staging' }}
      - name: Deploy Workers
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ENV: ${{ github.event.pull_request.base.ref == 'master' && 'production' || 'staging' }}
          NODE_ENV: production
